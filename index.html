<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>茉莉亞幼兒園 6月餐點表</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
        color: #111827;
        background: #eaf4ff;
      }
      .page {
        min-height: 100vh;
        background-image: linear-gradient(rgba(255,255,255,.2), rgba(255,255,255,.2)), url("./assets/bg-weather-sunny.jpg");
        background-position: center;
        background-size: cover;
        padding: 8px 14px 0;
      }
      .phone {
        min-height: 100vh;
        max-width: 430px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
      }
      .weather {
        align-self: flex-end;
        margin-bottom: 10px;
        border-radius: 999px;
        background: rgba(255,255,255,.75);
        padding: 3px 9px;
        font-size: 11px;
        color: #4b5563;
        backdrop-filter: blur(8px);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .brand img {
        width: 52px;
        height: 52px;
        object-fit: contain;
      }
      .brand p {
        margin: 0;
        color: #4b5563;
        font-size: 14px;
      }
      .brand h1 {
        margin: 2px 0 0;
        font-size: 22px;
        line-height: 1.15;
      }
      .tabs {
        display: flex;
        margin-bottom: 12px;
        border-radius: 14px;
        background: rgba(229,231,235,.75);
        padding: 4px;
      }
      .tabs button {
        flex: 1;
        border: 0;
        border-radius: 10px;
        background: transparent;
        padding: 10px 8px;
        font-size: 16px;
        font-weight: 800;
        color: #6b7280;
      }
      .tabs button.active {
        background: white;
        color: #007aff;
        box-shadow: 0 1px 5px rgba(0,0,0,.12);
      }
      .daily {
        flex: 1;
        min-height: 0;
      }
      .date {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 22px;
        margin: 8px 0 12px;
      }
      .arrow {
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 50%;
        background: white;
        color: #6b7280;
        font-size: 25px;
        box-shadow: 0 1px 5px rgba(0,0,0,.12);
      }
      .date-number {
        text-align: center;
      }
      .date-number strong {
        display: block;
        font-size: 52px;
        line-height: .9;
      }
      .date-number span {
        display: inline-block;
        margin-top: 8px;
        border-radius: 999px;
        background: #007aff;
        color: white;
        padding: 3px 13px;
        font-size: 14px;
        font-weight: 800;
      }
      .cards {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .card {
        overflow: hidden;
        border-radius: 16px;
        background: rgba(255,255,255,.88);
        box-shadow: 0 2px 8px rgba(0,0,0,.08);
        backdrop-filter: blur(8px);
      }
      .card-head {
        padding: 9px 14px;
        color: white;
        font-size: 15px;
        font-weight: 900;
      }
      .breakfast { background: linear-gradient(90deg, #ff9500, #ffb84d); }
      .lunch { background: linear-gradient(90deg, #34c759, #5bd47b); }
      .snack { background: linear-gradient(90deg, #5856d6, #7a79e0); }
      .card-body {
        padding: 12px 14px;
        color: #374151;
        font-size: 16px;
        font-weight: 700;
      }
      .meal-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 7px 0;
      }
      .badge {
        min-width: 36px;
        border-radius: 6px;
        color: white;
        padding: 3px 6px;
        text-align: center;
        font-size: 12px;
        font-weight: 900;
      }
      .b-staple { background: #30b15b; }
      .b-main { background: #f28b25; }
      .b-side { background: #7b61ff; }
      .b-soup { background: #36a2d6; }
      .b-fruit { background: #e55aa0; }
      .holiday-panel {
        min-height: 290px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      .holiday-panel h2 {
        margin: 0;
        color: #ff3b30;
        font-size: 30px;
      }
      .holiday-panel p {
        color: #6b7280;
      }
      .list {
        display: none;
        max-height: calc(100vh - 158px);
        overflow: auto;
        padding-bottom: 20px;
      }
      .item {
        width: 100%;
        margin-bottom: 10px;
        border: 0;
        border-radius: 16px;
        background: rgba(255,255,255,.9);
        padding: 13px 14px;
        text-align: left;
        box-shadow: 0 2px 8px rgba(0,0,0,.07);
      }
      .item b {
        margin-right: 10px;
        font-size: 24px;
      }
      .item .small {
        color: #4b5563;
        font-weight: 800;
      }
      .item p {
        margin: 8px 0 0;
        color: #4b5563;
        line-height: 1.45;
      }
      .note {
        margin-left: 8px;
        border-radius: 999px;
        background: #ff9500;
        color: white;
        padding: 2px 8px;
        font-size: 12px;
      }
      .calendar {
        margin-top: 12px;
        border-radius: 20px 20px 0 0;
        background: white;
        padding: 14px 14px 18px;
        box-shadow: 0 -2px 12px rgba(0,0,0,.08);
      }
      .calendar-title {
        margin-bottom: 10px;
        color: #4b5563;
        font-weight: 900;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
        text-align: center;
      }
      .dow {
        color: #9ca3af;
        font-size: 13px;
      }
      .day {
        aspect-ratio: 1;
        border: 0;
        border-radius: 12px;
        background: #f8fafc;
        color: #111827;
        font-size: 16px;
        font-weight: 900;
      }
      .day.holiday {
        background: transparent;
        color: #ff3b30;
      }
      .day.selected {
        background: #007aff;
        color: white;
      }
      @media (max-height: 720px) {
        .brand { margin-bottom: 8px; }
        .brand img { width: 44px; height: 44px; }
        .brand h1 { font-size: 20px; }
        .date-number strong { font-size: 44px; }
        .card-body { padding: 9px 12px; font-size: 15px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="phone">
        <div class="weather">晴朗 28°C</div>
        <header>
          <div class="brand">
            <img src="./assets/logo.png" alt="茉莉亞幼兒園 Logo" />
            <div>
              <p>新北市私立茉莉亞幼兒園</p>
              <h1>6月幼兒餐點表</h1>
            </div>
          </div>
          <div class="tabs">
            <button id="dailyBtn" class="active">每日餐點</button>
            <button id="listBtn">月份總覽</button>
          </div>
        </header>
        <section id="daily" class="daily">
          <div class="date">
            <button id="prev" class="arrow" aria-label="前一天">‹</button>
            <div class="date-number">
              <strong id="dateNo"></strong>
              <span id="week"></span>
            </div>
            <button id="next" class="arrow" aria-label="後一天">›</button>
          </div>
          <div id="dailyContent"></div>
        </section>
        <section id="list" class="list"></section>
        <section class="calendar">
          <div class="calendar-title">選擇日期</div>
          <div id="calendar" class="grid"></div>
        </section>
      </div>
    </main>
    <script>
      const menu = [{"date":1,"weekday":"一","weekdayEn":"Monday","isHoliday":false,"breakfast":"玉米蔬菜粥","lunch":{"staple":"白飯","main":"瓜仔肉","side1":"紅蘿蔔炒蛋","side2":"季節時蔬","soup":"大黃瓜肉絲湯","fruit":"時令水果"},"afternoon":"綠豆湯、蔬菜餅乾"},{"date":2,"weekday":"二","weekdayEn":"Tuesday","isHoliday":false,"breakfast":"菜包、黑豆漿","lunch":{"staple":"五穀飯","main":"青椒肉絲","side1":"麻婆豆腐","side2":"季節時蔬","soup":"味噌小魚湯","fruit":"時令水果"},"afternoon":"魷魚羹麵"},{"date":3,"weekday":"三","weekdayEn":"Wednesday","isHoliday":false,"breakfast":"海苔味噌拉麵","lunch":{"staple":"燕麥飯","main":"蔥爆雞柳","side1":"大黃瓜炒甜不辣","side2":"季節時蔬","soup":"海帶芽肉絲湯","fruit":"時令水果"},"afternoon":"蜂蜜蛋糕、牛奶"},{"date":4,"weekday":"四","weekdayEn":"Thursday","isHoliday":false,"breakfast":"什錦海鮮麵","lunch":{"staple":"地瓜飯","main":"什錦炒麵","side1":"香酥魚條、青菜豆腐湯","side2":"季節時蔬","soup":"蘿蔔雞湯","fruit":"時令水果"},"afternoon":"皮蛋瘦肉粥"},{"date":5,"weekday":"五","weekdayEn":"Friday","isHoliday":false,"breakfast":"什錦蝦仁麵","lunch":{"staple":"地瓜飯","main":"甜醬豬肉片","side1":"蠔油杏鮑菇","side2":"季節時蔬","soup":"蘿蔔雞湯","fruit":"時令水果"},"afternoon":"黑糖饅頭、仙草湯"},{"date":6,"weekday":"六","weekdayEn":"Saturday","isHoliday":true,"breakfast":"","lunch":{"staple":"","main":"","side1":"","side2":"","soup":"","fruit":""},"afternoon":""},{"date":7,"weekday":"日","weekdayEn":"Sunday","isHoliday":true,"breakfast":"","lunch":{"staple":"","main":"","side1":"","side2":"","soup":"","fruit":""},"afternoon":""},{"date":8,"weekday":"一","weekdayEn":"Monday","isHoliday":false,"breakfast":"雞茸玉米粥","lunch":{"staple":"白飯","main":"蔥爆肉絲","side1":"銀魚炒蛋","side2":"季節時蔬","soup":"雞蓉南瓜湯","fruit":"時令水果"},"afternoon":"茶葉蛋、紫菜味噌湯"},{"date":9,"weekday":"二","weekdayEn":"Tuesday","isHoliday":false,"breakfast":"鮮魚吐司、牛奶","lunch":{"staple":"五穀飯","main":"香菇蔬菜雞丁","side1":"乾片炒韭黃","side2":"季節時蔬","soup":"菇菇湯","fruit":"時令水果"},"afternoon":"切仔麵"},{"date":10,"weekday":"三","weekdayEn":"Wednesday","isHoliday":false,"breakfast":"粿仔條湯","lunch":{"staple":"地瓜飯","main":"洋蔥肉絲","side1":"三絲燴金針菇","side2":"季節時蔬","soup":"蕃茄洋蔥湯","fruit":"時令水果"},"afternoon":"馬芬糕、米漿"},{"date":11,"weekday":"四","weekdayEn":"Thursday","isHoliday":false,"breakfast":"饅頭夾蛋、豆漿","lunch":{"staple":"五穀飯","main":"銀魚五彩蛋炒飯","side1":"滷小翅腿、海芽味噌魚片湯","side2":"季節時蔬","soup":"蕃茄洋蔥湯","fruit":"時令水果"},"afternoon":"蘿蔔玉米甜不辣湯"},{"date":12,"weekday":"五","weekdayEn":"Friday","isHoliday":false,"breakfast":"陽春麵","lunch":{"staple":"燕麥飯","main":"黃瓜炒雞丁","side1":"什錦炒乾丁","side2":"季節時蔬","soup":"蔬菜豆腐蛋花","fruit":"時令水果"},"afternoon":"灰心麵包、牛奶"},{"date":13,"weekday":"六","weekdayEn":"Saturday","isHoliday":true,"breakfast":"","lunch":{"staple":"","main":"","side1":"","side2":"","soup":"","fruit":""},"afternoon":""},{"date":14,"weekday":"日","weekdayEn":"Sunday","isHoliday":true,"breakfast":"","lunch":{"staple":"","main":"","side1":"","side2":"","soup":"","fruit":""},"afternoon":""},{"date":15,"weekday":"一","weekdayEn":"Monday","isHoliday":false,"breakfast":"什錦糙米粥","lunch":{"staple":"白飯","main":"梅干扣肉","side1":"洋熱炒蛋","side2":"季節時蔬","soup":"金針肉絲湯","fruit":"時令水果"},"afternoon":"古早味香菇米粉湯"},{"date":16,"weekday":"二","weekdayEn":"Tuesday","isHoliday":false,"breakfast":"鮮肉包、黑豆漿","lunch":{"staple":"五穀飯","main":"京醬肉絲","side1":"家常豆腐","side2":"季節時蔬","soup":"黃豆芽肉絲湯","fruit":"時令水果"},"afternoon":"檸檬冬瓜、法國麵包"},{"date":17,"weekday":"三","weekdayEn":"Wednesday","isHoliday":false,"breakfast":"麵疙瘩","lunch":{"staple":"地瓜飯","main":"蕃茄白肉","side1":"紅蘿蔔炒蛋","side2":"季節時蔬","soup":"香菇雞湯","fruit":"時令水果"},"afternoon":"豆漿、蔥花饅頭"},{"date":18,"weekday":"四","weekdayEn":"Thursday","isHoliday":false,"breakfast":"培根吐司、牛奶","lunch":{"staple":"蕃茄肉醬義大利麵","main":"雞鳳腿","side1":"燙花椰菜、南瓜蘑菇湯","side2":"季節時蔬","soup":"海鮮粥","fruit":"時令水果"},"afternoon":"海鮮粥"},{"date":19,"weekday":"五","weekdayEn":"Friday","isHoliday":true,"breakfast":"","lunch":{"staple":"","main":"","side1":"","side2":"","soup":"","fruit":""},"afternoon":"","specialNote":"祝福您闔家端午安康"},{"date":20,"weekday":"六","weekdayEn":"Saturday","isHoliday":true,"breakfast":"","lunch":{"staple":"","main":"","side1":"","side2":"","soup":"","fruit":""},"afternoon":""},{"date":21,"weekday":"日","weekdayEn":"Sunday","isHoliday":true,"breakfast":"","lunch":{"staple":"","main":"","side1":"","side2":"","soup":"","fruit":""},"afternoon":""},{"date":22,"weekday":"一","weekdayEn":"Monday","isHoliday":false,"breakfast":"香菇雞肉粥","lunch":{"staple":"白飯","main":"滷絞肉","side1":"什錦蔬菜炒蛋","side2":"季節時蔬","soup":"雙蘿排骨湯","fruit":"時令水果"},"afternoon":"加汁鯖魚麵"},{"date":23,"weekday":"二","weekdayEn":"Tuesday","isHoliday":false,"breakfast":"雜糧饅頭、豆漿","lunch":{"staple":"五穀飯","main":"馬鈴薯燉肉","side1":"酸菜麵腸","side2":"季節時蔬","soup":"枸杞雞湯","fruit":"時令水果"},"afternoon":"肉燥米苔目"},{"date":24,"weekday":"三","weekdayEn":"Wednesday","isHoliday":false,"breakfast":"鍋燒意麵","lunch":{"staple":"地瓜飯","main":"糖醋魚條","side1":"竹筍炒肉絲","side2":"季節時蔬","soup":"青木瓜排骨湯","fruit":"時令水果"},"afternoon":"蔥花饅頭、豆漿"},{"date":25,"weekday":"四","weekdayEn":"Thursday","isHoliday":false,"breakfast":"果醬吐司、牛奶","lunch":{"staple":"地瓜飯","main":"咖哩雞馬鈴薯燴飯","side1":"花枝排、蘿菇濃湯","side2":"季節時蔬","soup":"綠豆珍珠粉條湯","fruit":"時令水果"},"afternoon":"綠豆珍珠粉條湯"},{"date":26,"weekday":"五","weekdayEn":"Friday","isHoliday":false,"breakfast":"雲吞麵","lunch":{"staple":"燕麥飯","main":"彩椒炒雞丁","side1":"塔香海龍","side2":"季節時蔬","soup":"大黃瓜肉絲湯","fruit":"時令水果"},"afternoon":"仙草湯、古早大餅"},{"date":27,"weekday":"六","weekdayEn":"Saturday","isHoliday":true,"breakfast":"","lunch":{"staple":"","main":"","side1":"","side2":"","soup":"","fruit":""},"afternoon":""},{"date":28,"weekday":"日","weekdayEn":"Sunday","isHoliday":true,"breakfast":"","lunch":{"staple":"","main":"","side1":"","side2":"","soup":"","fruit":""},"afternoon":""},{"date":29,"weekday":"一","weekdayEn":"Monday","isHoliday":false,"breakfast":"皮蛋瘦肉粥","lunch":{"staple":"白飯","main":"五香肉醬","side1":"樹花蛋","side2":"季節時蔬","soup":"蕃茄豆腐湯","fruit":"時令水果"},"afternoon":"紫魚滑蛋雞絲麵"},{"date":30,"weekday":"二","weekdayEn":"Tuesday","isHoliday":false,"breakfast":"榨菜肉絲麵","lunch":{"staple":"燕麥飯","main":"三杯雞","side1":"小魚乾炒乾片","side2":"季節時蔬","soup":"玉米排骨湯","fruit":"時令水果"},"afternoon":"珍珠麵包"}];
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      let current = 2;
      const $ = (id) => document.getElementById(id);

      function selectedMenu() {
        return menu.find((item) => item.date === current);
      }

      function renderDaily() {
        const item = selectedMenu();
        $("dateNo").textContent = String(item.date).padStart(2, "0");
        $("week").textContent = "星期" + item.weekday;

        if (item.isHoliday) {
          $("dailyContent").innerHTML = `
            <div class="holiday-panel">
              <h2>${item.specialNote || "週休二日"}</h2>
              <p>6月${item.date}日 星期${item.weekday}</p>
            </div>
          `;
        } else {
          $("dailyContent").innerHTML = `
            <div class="cards">
              <article class="card">
                <div class="card-head breakfast">早餐 08:30</div>
                <div class="card-body">${item.breakfast}</div>
              </article>
              <article class="card">
                <div class="card-head lunch">午餐 11:30</div>
                <div class="card-body">
                  <div class="meal-row"><span class="badge b-staple">主食</span>${item.lunch.staple}</div>
                  <div class="meal-row"><span class="badge b-main">主菜</span>${item.lunch.main}</div>
                  <div class="meal-row"><span class="badge b-side">副菜</span>${item.lunch.side1}</div>
                  ${item.lunch.side2 ? `<div class="meal-row"><span class="badge b-side">副菜</span>${item.lunch.side2}</div>` : ""}
                  <div class="meal-row"><span class="badge b-soup">湯品</span>${item.lunch.soup}</div>
                  <div class="meal-row"><span class="badge b-fruit">水果</span>${item.lunch.fruit}</div>
                </div>
              </article>
              <article class="card">
                <div class="card-head snack">午點 15:30</div>
                <div class="card-body">${item.afternoon}</div>
              </article>
            </div>
          `;
        }

        renderCalendar();
      }

      function renderCalendar() {
        const header = weekdays.map((day) => `<div class="dow">${day}</div>`).join("");
        const empty = "<div></div>";
        const days = menu.map((item) => `
          <button class="day ${item.isHoliday ? "holiday" : ""} ${item.date === current ? "selected" : ""}" data-date="${item.date}">
            ${item.date}
          </button>
        `).join("");
        $("calendar").innerHTML = header + empty + days;
        document.querySelectorAll(".day").forEach((button) => {
          button.addEventListener("click", () => {
            current = Number(button.dataset.date);
            showDaily();
            renderDaily();
          });
        });
      }

      function renderList() {
        $("list").innerHTML = menu.map((item) => `
          <button class="item" data-date="${item.date}">
            <b>${String(item.date).padStart(2, "0")}</b>
            <span class="small">6月${item.date}日 星期${item.weekday}</span>
            ${item.specialNote ? `<span class="note">${item.specialNote}</span>` : ""}
            ${item.isHoliday
              ? `<p style="color:#ff3b30;font-weight:900">${item.specialNote || "週休二日"}</p>`
              : `<p>早餐：${item.breakfast}</p><p>午餐：${[item.lunch.staple, item.lunch.main, item.lunch.side1].filter(Boolean).join(" / ")}</p><p>午點：${item.afternoon}</p>`
            }
          </button>
        `).join("");
        document.querySelectorAll(".item").forEach((button) => {
          button.addEventListener("click", () => {
            current = Number(button.dataset.date);
            showDaily();
            renderDaily();
          });
        });
      }

      function showDaily() {
        $("daily").style.display = "block";
        $("list").style.display = "none";
        $("dailyBtn").classList.add("active");
        $("listBtn").classList.remove("active");
      }

      function showList() {
        $("daily").style.display = "none";
        $("list").style.display = "block";
        $("dailyBtn").classList.remove("active");
        $("listBtn").classList.add("active");
        renderList();
      }

      $("prev").addEventListener("click", () => {
        current = current <= 1 ? 30 : current - 1;
        renderDaily();
      });
      $("next").addEventListener("click", () => {
        current = current >= 30 ? 1 : current + 1;
        renderDaily();
      });
      $("dailyBtn").addEventListener("click", showDaily);
      $("listBtn").addEventListener("click", showList);

      renderDaily();
    </script>
  </body>
</html>
